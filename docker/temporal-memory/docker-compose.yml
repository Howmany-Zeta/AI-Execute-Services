# L1 Temporal Memory — local FalkorDB for Graphiti (TM-073)
# Usage: docker compose -f docker/temporal-memory/docker-compose.yml up -d
# No aiecs-kg service (ADR-003).

services:
  falkordb:
    image: falkordb/falkordb:latest
    container_name: aiecs-temporal-falkordb
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Optional Neo4j backend (uncomment + set TM_GRAPH_BACKEND=neo4j on AIECS host):
