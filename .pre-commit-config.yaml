# Pre-commit hooks configuration for AIECS
# Install: poetry run pre-commit install
# Run manually: poetry run pre-commit run --all-files

repos:
  - repo: local
    hooks:
      # -----------------------------------------------------------------------
      # black — code formatter
      # Formats aiecs/ in-place; pre-commit fails if files were modified,
      # prompting the developer to re-stage and commit.
      # -----------------------------------------------------------------------
      - id: black
        name: black (code formatter)
        entry: poetry run black
        language: system
        types: [python]
        files: '^aiecs/'
        description: "Formats Python code with black (line-length=200, see pyproject.toml)"

      # -----------------------------------------------------------------------
      # flake8 — style & lint checker
      # Reads config from .flake8 (max-line-length=200, E203/W503 ignored).
      # -----------------------------------------------------------------------
      - id: flake8
        name: flake8 (style & lint)
        entry: poetry run flake8
        language: system
        types: [python]
        files: '^aiecs/'
        description: "Checks PEP8 compliance with flake8 (config in .flake8)"

      # -----------------------------------------------------------------------
      # mypy — static type checker
      # Reads config from [tool.mypy] in pyproject.toml.
      # pass_filenames=false so mypy analyses the whole package at once,
      # enabling cross-module type inference.
      # -----------------------------------------------------------------------
      - id: mypy
        name: mypy (type checker)
        entry: poetry run mypy
        language: system
        types: [python]
        files: '^aiecs/'
        pass_filenames: false
        description: "Runs mypy static type checking on aiecs/ (config in pyproject.toml [tool.mypy])"

      # -----------------------------------------------------------------------
      # Schema coverage validation (existing hooks)
      # -----------------------------------------------------------------------
      - id: validate-schema-coverage
        name: Validate Tool Schema Coverage
        entry: bash -c 'poetry run python -m aiecs.scripts.tools_develop.validate_tool_schemas --min-coverage 90 --export-coverage /tmp/schema_coverage.json || exit 1'
        language: system
        pass_filenames: false
        always_run: true
        description: "Validates that all tools have schema coverage >= 90%"

      - id: schema-coverage-check
        name: Schema Coverage Check
        entry: bash -c 'poetry run aiecs-tools-schema-coverage --min-coverage 90 --format json > /tmp/schema_coverage_check.json 2>&1 || exit 1'
        language: system
        pass_filenames: false
        always_run: false
        files: '^aiecs/tools/.*\.py$'
        description: "Checks schema coverage for all tools (runs when tool files change)"

