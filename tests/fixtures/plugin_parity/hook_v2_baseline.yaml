name: hook_v2_baseline
description: HybridAgent with HookPlugin v2 enabled — permissions + compact layer baseline (V2-16)
agent:
  tools:
  - parity_search
config:
  goal: Hook v2 parity baseline agent
  llm_model: parity-mock
  system_prompt: You are a hook v2 parity baseline agent.
  skills_enabled: false
  memory_enabled: false
  enable_prompt_caching: false
  plugins:
  - name: hook
    enabled: true
    options:
      enable_v2_hooks: true
      inline_hooks:
        user_prompt_submit:
        - type: prompt
          prompt: "V2 audit: $ARGUMENTS"
          block_on_failure: false
task:
  description: Hook v2 baseline task
context: {}
capture:
  mock_final_output: Hook v2 baseline final response.
expect:
  messages_normalized:
  - role: system
    content: You are a hook v2 parity baseline agent.
  - role: system
    content: 'Available tools: parity_search'
  - role: user
    content: 'Task: Hook v2 baseline task'
  tool_schema_names:
  - parity_search
  plugin_state_keys: []
  execute_task_response:
    iterations: 1
    output: Hook v2 baseline final response.
    reason: null
    reasoning_steps:
    - content: Hook v2 baseline final response.
      iteration: 1
      type: thought
    success: true
    tool_calls_count: 0
