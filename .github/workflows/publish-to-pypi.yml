name: Publish to PyPI

on:
  release:
    types: [published]  # 当创建正式 release 时触发
  workflow_dispatch:    # 允许手动触发

jobs:
  build-and-publish:
    name: Build and publish Python distribution to PyPI
    runs-on: ubuntu-latest
    environment: 
      name: pypi
      url: https://pypi.org/p/aiecs
    permissions:
      id-token: write  # 用于 trusted publishing
      contents: read   # 用于检出代码
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    
    - name: Clean previous builds
      run: |
        rm -rf build/ dist/ *.egg-info/
    
    - name: Build package
      run: |
        python -m build
    
    - name: Verify package
      run: |
        twine check dist/*

    - name: Verify version matches release tag
      if: github.event_name == 'release'
      run: |
        TAG_VERSION="${{ github.event.release.tag_name }}"
        TAG_VERSION="${TAG_VERSION#v}"
        PKG_VERSION=$(python - <<'PY'
        import pathlib
        import re
        import zipfile

        wheel = next(pathlib.Path("dist").glob("*.whl"))
        with zipfile.ZipFile(wheel) as zf:
            metadata_name = next(name for name in zf.namelist() if name.endswith(".dist-info/METADATA"))
            metadata = zf.read(metadata_name).decode()
        match = re.search(r"^Version: (.+)$", metadata, re.MULTILINE)
        if not match:
            raise SystemExit("Could not read package version from wheel METADATA")
        print(match.group(1))
        PY
        )
        echo "Release tag version: ${TAG_VERSION}"
        echo "Built package version: ${PKG_VERSION}"
        if [ "${TAG_VERSION}" != "${PKG_VERSION}" ]; then
          echo "::error::Version mismatch: release tag v${TAG_VERSION} but built package is ${PKG_VERSION}. Fix the git tag or bump pyproject.toml before publishing."
          exit 1
        fi

    - name: Check if version already exists on PyPI
      run: |
        PKG_VERSION=$(python - <<'PY'
        import pathlib
        import re
        import zipfile

        wheel = next(pathlib.Path("dist").glob("*.whl"))
        with zipfile.ZipFile(wheel) as zf:
            metadata_name = next(name for name in zf.namelist() if name.endswith(".dist-info/METADATA"))
            metadata = zf.read(metadata_name).decode()
        match = re.search(r"^Version: (.+)$", metadata, re.MULTILINE)
        if not match:
            raise SystemExit("Could not read package version from wheel METADATA")
        print(match.group(1))
        PY
        )
        echo "Checking PyPI for existing release: ${PKG_VERSION}"
        if curl -fsS "https://pypi.org/pypi/aiecs/${PKG_VERSION}/json" > /dev/null; then
          echo "::error::Version ${PKG_VERSION} already exists on PyPI. Bump the version before publishing."
          exit 1
        fi
        echo "Version ${PKG_VERSION} is available for upload."
    
    - name: List package contents
      run: |
        echo "📦 Generated packages:"
        ls -la dist/
        echo ""
        echo "📋 Package sizes:"
        du -h dist/*
    
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        verbose: true
        print-hash: true
    
    - name: Test installation from PyPI
      run: |
        echo "⏳ Waiting for package to be available on PyPI..."
        sleep 60
        echo "🧪 Testing installation from PyPI..."
        pip install aiecs
        echo "✅ Package installed successfully!"
        
        # Test basic import
        python -c "import aiecs; print(f'AIECS version: {aiecs.__version__}')"
        
        # Test command line tools
        aiecs --help
        aiecs-check-deps --help
